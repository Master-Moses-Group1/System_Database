<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      /* Add your CSS here for the sidebar and login page */
      #dashboard { display: none; display: flex; }
      .sidebar { width: 250px; background: #333; color: white; height: 100vh; }
      .content { flex: 1; padding: 20px; }
      .user-info { display: flex; align-items: center; gap: 10px; float: right; }
      .user-photo { width: 40px; height: 40px; border-radius: 50%; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="login-section">
      <h2>Login</h2>
      <input type="text" id="email" placeholder="Email">
      <input type="password" id="pass" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>

    <div id="dashboard" class="hidden">
      <div class="sidebar" id="sidebar-buttons">
        </div>
      
      <div class="content">
        <nav>
          <div class="user-info">
            <img id="user-img" class="user-photo" src="">
            <span id="user-name"></span>
            <button onclick="logout()">Logout</button>
          </div>
        </nav>
        <div id="main-display">
          <h1>Welcome! Select an option from the sidebar.</h1>
        </div>
      </div>
    </div>

    <script>
  const allButtons = ["Plantilla", "Summary", "Payroll", "Leave", "Records"];

  // REPLACE YOUR OLD LOGIN FUNCTION WITH THIS:
  function login() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    
    // REPLACE THIS URL with your actual Apps Script Web App URL
    const url = "https://script.google.com/macros/s/AKfycbx1WBIyuZqtwyfp_IxXeiqyEZNJZqlZa6LbAGFXgki36N8goOXjxyFJpAhKeUHGybFj/exec"; 

    fetch(url, {
      method: "POST",
      // This sends the data as a string to your Apps Script doPost(e) function
      body: JSON.stringify({ email: email, pass: pass })
    })
    .then(res => res.json())
    .then(response => {
      if (response.status === "success") {
        showDashboard(response);
      } else {
        alert("Invalid Credentials");
      }
    })
    .catch(err => {
      console.error("Error:", err);
      alert("System Error: Could not connect to the database.");
    });
  }

  // Keep your showDashboard, loadContent, and logout functions below...
</script>
