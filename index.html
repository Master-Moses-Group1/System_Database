<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Yeti Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow-dark: #a3b1c6;
            --shadow-light: #ffffff;
            --accent: #448aff;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            width: 350px;
            padding: 40px;
            background: var(--bg);
            border-radius: 30px;
            box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light);
            text-align: center;
            position: relative;
        }

        /* YETI ANIMATION AREA */
        .yeti-container {
            width: 150px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .yeti-arms {
            position: absolute;
            top: 50px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transition: 0.5s ease;
            opacity: 0;
            transform: translateY(20px);
            z-index: 10;
        }

        .yeti-arms.covering {
            opacity: 1;
            transform: translateY(0);
        }

        .arm {
            width: 40px;
            height: 60px;
            background: white;
            border-radius: 20px;
            border: 2px solid #ccc;
        }

        /* NEUMORPHIC INPUTS */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px;
            border: none;
            outline: none;
            background: var(--bg);
            border-radius: 10px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            box-sizing: border-box;
            color: #444;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: var(--bg);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            color: var(--accent);
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        #status {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="yeti-container">
        <svg viewBox="0 0 100 100" width="100">
            <circle cx="50" cy="50" r="45" fill="white" stroke="#eee" stroke-width="2"/>
            <g id="eyes">
                <circle cx="35" cy="45" r="5" fill="#333"/>
                <circle cx="65" cy="45" r="5" fill="#333"/>
            </g>
            <path d="M40 70 Q50 80 60 70" fill="none" stroke="#333" stroke-width="2"/>
        </svg>
        <div class="yeti-arms" id="yetiArms">
            <div class="arm"></div>
            <div class="arm"></div>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="user" placeholder="Username" onfocus="lookBack()">
    </div>
    <div class="input-group">
        <input type="password" id="pass" placeholder="Access Key" onfocus="coverEyes()">
    </div>

    <button class="btn" onclick="runAuth()">LOGIN</button>
    <p id="status">Ready for authorization...</p>
</div>

<script>
    // YOUR APPS SCRIPT URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbLe7DYkkXG0zny0K6-bnPgpsklJhZ3nVIHcakt0yqTkAiYyH3DL8EtU8K903pUr6toxw/exec";

    function coverEyes() {
        document.getElementById('yetiArms').classList.add('covering');
    }

    function lookBack() {
        document.getElementById('yetiArms').classList.remove('covering');
    }

    function runAuth() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const status = document.getElementById('status');
        
        if(!u || !p) return;

        status.innerText = "Verifying credentials...";

        fetch(`${WEB_APP_URL}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`)
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    status.style.color = "green";
                    status.innerText = "Access Granted. Redirecting...";
                    setTimeout(() => {
                        window.location.href = res.url;
                    }, 1500);
                } else {
                    status.style.color = "red";
                    status.innerText = "Access Denied: " + (res.msg || "Invalid Key");
                }
            })
            .catch(err => {
                status.innerText = "System Connection Error";
                console.error(err);
            });
    }
</script>

</body>
</html>
